<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>3分デモ | re:Memory</title>
    <meta name="description" content="re:Memoryの思い出カプセルをLP上で体験できるデモページです。">
    <link rel="icon" href="./assets/logo.png">
    <style>
      :root {
        --ink: #1f2a2a;
        --sub: #60706c;
        --paper: #fff9ef;
        --milk: #fffdf8;
        --line: rgba(31, 42, 42, 0.13);
        --green: #176e66;
        --green-deep: #0d4846;
        --green-soft: #dbece7;
        --clay: #c86b55;
        --clay-soft: #f7dfd4;
        --shadow: 0 24px 70px rgba(31, 42, 42, 0.14);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        color: var(--ink);
        background: radial-gradient(circle at 88% 8%, #eef4ea 0, rgba(238, 244, 234, 0) 32%), var(--paper);
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", system-ui, sans-serif;
        line-height: 1.85;
      }

      a { color: inherit; text-decoration: none; }
      img { display: block; width: 100%; }
      p, h1, h2, h3 { margin: 0; word-break: keep-all; line-break: strict; }

      .header {
        position: sticky;
        top: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 24px;
        min-height: 72px;
        padding: 16px clamp(20px, 5vw, 64px);
        background: rgba(255, 249, 239, 0.9);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(18px);
      }

      .logo {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-size: 17px;
        font-weight: 850;
      }

      .logo img {
        width: 40px;
        height: 40px;
        object-fit: cover;
        border-radius: 50%;
        box-shadow: 0 8px 20px rgba(31, 42, 42, 0.12);
      }

      .nav {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        color: var(--sub);
        font-size: 14px;
        font-weight: 750;
      }

      .nav a { padding: 8px 12px; border-radius: 8px; }
      .nav a:hover, .nav a[aria-current="page"] { color: var(--green-deep); background: rgba(23, 110, 102, 0.08); }

      main {
        width: min(1180px, calc(100% - 40px));
        margin: 0 auto;
        padding: clamp(52px, 8vw, 94px) 0 clamp(78px, 9vw, 118px);
      }

      .page-hero {
        display: grid;
        grid-template-columns: minmax(0, 0.82fr) minmax(380px, 1fr);
        gap: clamp(34px, 6vw, 76px);
        align-items: start;
      }

      .label {
        display: inline-flex;
        width: fit-content;
        min-height: 32px;
        padding: 5px 11px;
        color: var(--green-deep);
        background: var(--green-soft);
        border: 1px solid rgba(23, 110, 102, 0.15);
        border-radius: 8px;
        font-size: 12px;
        font-weight: 850;
      }

      h1 {
        max-width: 500px;
        margin-top: 18px;
        font-size: clamp(34px, 3.4vw, 38px);
        line-height: 1.14;
      }

      .lead {
        max-width: 690px;
        margin-top: 24px;
        color: var(--sub);
        font-size: clamp(16px, 2vw, 20px);
      }

      .demo-form,
      .capsule-preview {
        padding: clamp(22px, 4vw, 34px);
        background: rgba(255, 253, 247, 0.78);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: var(--shadow);
      }

      .demo-form {
        display: grid;
        gap: 18px;
        margin-top: 30px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      .field span {
        color: var(--sub);
        font-size: 13px;
        font-weight: 850;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid rgba(31, 42, 42, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.78);
        color: var(--ink);
        font: inherit;
      }

      input,
      select {
        min-height: 48px;
        padding: 10px 12px;
      }

      textarea {
        min-height: 118px;
        resize: vertical;
        padding: 12px;
      }

      input:focus,
      textarea:focus,
      select:focus {
        outline: 2px solid rgba(23, 110, 102, 0.22);
        border-color: rgba(23, 110, 102, 0.38);
      }

      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 52px;
        padding: 13px 22px;
        border: 1px solid transparent;
        border-radius: 8px;
        color: white;
        background: var(--green);
        font-weight: 850;
        cursor: pointer;
      }

      .capsule-preview {
        position: sticky;
        top: 104px;
      }

      .preview-photo {
        min-height: 260px;
        display: grid;
        align-content: end;
        padding: 22px;
        background:
          linear-gradient(180deg, rgba(13, 72, 70, 0.02), rgba(13, 72, 70, 0.48)),
          url("./assets/memory-hero.png") center / cover;
        border-radius: 8px;
        color: white;
      }

      .preview-photo small {
        font-size: 12px;
        font-weight: 850;
        opacity: 0.86;
      }

      .preview-photo strong {
        margin-top: 4px;
        font-size: clamp(23px, 4vw, 34px);
        line-height: 1.25;
      }

      .preview-card {
        margin-top: 14px;
        padding: 18px;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(31, 42, 42, 0.1);
        border-radius: 8px;
      }

      .preview-card span {
        color: var(--sub);
        font-size: 12px;
        font-weight: 850;
      }

      .preview-card p,
      .preview-card strong {
        display: block;
        margin-top: 7px;
        color: var(--ink);
        font-size: 16px;
        line-height: 1.8;
        word-break: normal;
        overflow-wrap: anywhere;
      }

      .note {
        margin-top: 14px;
        color: var(--sub);
        font-size: 13px;
        line-height: 1.8;
      }

      @media (max-width: 900px) {
        .header { align-items: flex-start; flex-direction: column; }
        .page-hero { grid-template-columns: 1fr; }
        .capsule-preview { position: static; }
      }
    </style>
    <link rel="stylesheet" href="./assets/premium.css">
  </head>
  <body>
    <header class="header">
      <a class="logo" href="./index.html" aria-label="re:Memory トップへ">
        <img src="./assets/logo.png" alt="" aria-hidden="true">
        <span>re:Memory</span>
      </a>
      <nav class="nav" aria-label="ページナビゲーション">
        <a href="./index.html">トップ</a>
        <a href="./demo.html" aria-current="page">デモ</a>
        <a href="./guide.html">使い方</a>
        <a href="./index.html#messages">掲示板</a>
        <a href="./company.html">会社情報</a>
      </nav>
    </header>

    <main>
      <section class="page-hero">
        <div>
          <span class="label">3分デモ</span>
          <h1 style="max-width: 460px; font-size: 38px; line-height: 1.18;">思い出カプセルを、<br>その場で作ってみる。</h1>
          <p class="lead">
            実際の保存はせず、LP内だけでカードを作れるデモです。写真を選ぶ気持ち、言葉を添える感覚、未来の日に開く体験を短く試せます。
          </p>

          <form class="demo-form" id="capsule-form">
            <label class="field">
              <span>思い出のタイトル</span>
              <input id="capsule-title" maxlength="48" value="放課後、はじめて二人で帰った日">
            </label>
            <label class="field">
              <span>その日に残すひとこと</span>
              <textarea id="capsule-message" maxlength="240">今日は少し不安。でも、ランドセルがうれしい。</textarea>
            </label>
            <label class="field">
              <span>開くタイミング</span>
              <select id="capsule-date">
                <option>2028年4月8日 / 中学校の入学前</option>
                <option>次の誕生日</option>
                <option>卒業式の前日</option>
                <option>少し元気がない日に</option>
              </select>
            </label>
            <button class="button" type="submit">カードに反映する</button>
          </form>
        </div>

        <aside class="capsule-preview" aria-label="作成された思い出カード">
          <div class="preview-photo">
            <small>選んだ一枚</small>
            <strong id="preview-title">放課後、はじめて二人で帰った日</strong>
          </div>
          <div class="preview-card">
            <span>今日の言葉</span>
            <p id="preview-message">今日は少し不安。でも、ランドセルがうれしい。</p>
          </div>
          <div class="preview-card">
            <span>次にひらく日</span>
            <strong id="preview-date">2028年4月8日 / 中学校の入学前</strong>
          </div>
          <p class="note">このデモの入力内容は保存されません。本番アプリでは、選んだ写真と言葉を未来の開封日まで眠らせる想定です。</p>
        </aside>
      </section>
    </main>

    <script>
      const form = document.querySelector("#capsule-form");
      const titleInput = document.querySelector("#capsule-title");
      const messageInput = document.querySelector("#capsule-message");
      const dateInput = document.querySelector("#capsule-date");
      const previewTitle = document.querySelector("#preview-title");
      const previewMessage = document.querySelector("#preview-message");
      const previewDate = document.querySelector("#preview-date");

      function updatePreview() {
        previewTitle.textContent = titleInput.value.trim() || "タイトル未入力の思い出";
        previewMessage.textContent = messageInput.value.trim() || "ひとことを入力してください。";
        previewDate.textContent = dateInput.value;
      }

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        updatePreview();
      });

      [titleInput, messageInput, dateInput].forEach((input) => {
        input.addEventListener("input", updatePreview);
        input.addEventListener("change", updatePreview);
      });
    </script>
  </body>
</html>
